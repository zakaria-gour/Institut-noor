<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1040">
<title>فصل العربية — دردشة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --purple-dark: #3C3489;
  --teal: #1D9E75;
  --teal-light: #E1F5EE;
  --bg: #f7f6ff;
  --surface: #ffffff;
  --border: rgba(83,74,183,0.13);
  --text: #1a1040;
  --text-2: #5c5880;
  --text-3: #9896b0;
  --radius: 14px;
  --radius-sm: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
}

/* ── SCREENS ── */
.screen { display: none; height: 100vh; height: 100dvh; }
.screen.active { display: flex; flex-direction: column; }

/* ── LOGIN ── */
#login {
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #1a1040 0%, #2d1f7a 50%, #1a3050 100%);
  padding: 20px;
}
.login-logo {
  font-size: 48px;
  margin-bottom: 8px;
  text-align: center;
}
.login-title {
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 4px;
}
.login-sub {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  text-align: center;
  margin-bottom: 32px;
}
.login-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.field-label {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  margin-bottom: 6px;
  letter-spacing: .05em;
}
.text-inp {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 15px;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  outline: none;
  transition: border-color .2s;
}
.text-inp::placeholder { color: rgba(255,255,255,0.3); }
.text-inp:focus { border-color: rgba(255,255,255,0.4); }
.role-row { display: flex; gap: 8px; }
.role-btn {
  flex: 1; padding: 10px 8px; border-radius: var(--radius-sm);
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
  font-size: 14px; font-family: 'Cairo', sans-serif;
  cursor: pointer; text-align: center; transition: all .15s;
}
.role-btn.on {
  background: var(--purple);
  border-color: var(--purple);
  color: #fff;
  font-weight: 600;
}
.join-btn {
  width: 100%; padding: 14px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #534AB7, #7F77DD);
  border: none; color: #fff;
  font-size: 16px; font-weight: 700;
  font-family: 'Cairo', sans-serif;
  cursor: pointer; transition: opacity .15s;
}
.join-btn:active { opacity: .85; }
.err-msg {
  font-size: 12px; color: #ff8fa3;
  text-align: center; display: none;
}

/* ── CHAT ── */
#chat { flex-direction: column; background: var(--bg); }

.chat-top {
  background: linear-gradient(135deg, #1a1040, #2d1f7a);
  color: #fff;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(26,16,64,.3);
}
.back-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none; cursor: pointer;
  color: #fff; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.room-av {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; flex-shrink: 0;
}
.top-info { flex: 1; min-width: 0; }
.top-name { font-size: 16px; font-weight: 700; }
.top-status { font-size: 12px; color: rgba(255,255,255,0.6); }
.online-pill {
  display: flex; align-items: center; gap: 5px;
  background: rgba(29,158,117,0.25);
  border: 1px solid rgba(29,158,117,0.4);
  border-radius: 20px; padding: 4px 10px;
  font-size: 12px; color: #5DCAA5; flex-shrink: 0;
}
.green-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #1D9E75;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: .4; }
}

/* messages area */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  -webkit-overflow-scrolling: touch;
}
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sys-msg {
  text-align: center;
  font-size: 12px;
  color: var(--text-3);
  padding: 4px 12px;
  background: rgba(83,74,183,0.07);
  border-radius: 20px;
  align-self: center;
}
.day-divider {
  text-align: center; font-size: 11px; color: var(--text-3);
  display: flex; align-items: center; gap: 8px;
}
.day-divider::before, .day-divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

.msg-row { display: flex; align-items: flex-end; gap: 7px; }
.msg-row.mine { flex-direction: row-reverse; }

.msg-av {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  align-self: flex-end;
}
.msg-body { max-width: 72%; display: flex; flex-direction: column; }
.msg-sender {
  font-size: 11px; font-weight: 600; margin-bottom: 3px;
  color: var(--text-2);
}
.msg-row.mine .msg-sender { text-align: left; }

.bubble {
  padding: 9px 13px;
  font-size: 14px; line-height: 1.6;
  direction: rtl; word-break: break-word;
}
.bubble-other {
  background: var(--surface);
  color: var(--text);
  border-radius: 16px 16px 16px 4px;
  border: 1px solid var(--border);
}
.bubble-mine {
  background: linear-gradient(135deg, #534AB7, #7F77DD);
  color: #fff;
  border-radius: 16px 16px 4px 16px;
}
.bubble-teacher {
  background: var(--teal-light);
  color: #04342C;
  border-radius: 16px 16px 16px 4px;
  border: 1px solid rgba(29,158,117,0.25);
}
.teacher-badge {
  display: inline-block;
  font-size: 10px; background: rgba(29,158,117,0.15);
  color: var(--teal); border: 1px solid rgba(29,158,117,0.3);
  padding: 1px 6px; border-radius: 4px;
  margin-bottom: 3px; font-weight: 600;
}
.msg-time {
  font-size: 10px; color: var(--text-3);
  margin-top: 3px;
}
.msg-row.mine .msg-time { text-align: left; }

/* input */
.input-wrap {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  padding-bottom: calc(10px + var(--safe-bottom));
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.chat-inp {
  flex: 1; padding: 11px 16px;
  border-radius: 24px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 15px; font-family: 'Cairo', sans-serif;
  direction: rtl; outline: none;
  transition: border-color .2s;
}
.chat-inp:focus { border-color: var(--purple); }
.send-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, #534AB7, #7F77DD);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: transform .1s;
}
.send-btn:active { transform: scale(.92); }
.send-btn svg { width: 18px; height: 18px; fill: #fff; }

/* users drawer */
.users-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none;
  color: #fff; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.drawer-overlay {
  display: none;
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 10;
}
.drawer-overlay.open { display: block; }
.drawer {
  position: absolute; top: 0; left: 0;
  width: 260px; height: 100%;
  background: var(--surface);
  z-index: 11;
  display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform .25s ease;
}
.drawer.open { transform: translateX(0); }
.drawer-hdr {
  padding: 16px;
  padding-top: calc(16px + env(safe-area-inset-top,0px));
  background: linear-gradient(135deg, #1a1040, #2d1f7a);
  color: #fff;
}
.drawer-title { font-size: 16px; font-weight: 700; }
.drawer-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.drawer-list { flex: 1; overflow-y: auto; padding: 10px 0; }
.d-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
}
.d-name { font-size: 14px; color: var(--text); flex: 1; }
.d-tag {
  font-size: 10px; background: #FAEEDA; color: #633806;
  padding: 2px 6px; border-radius: 4px; font-weight: 600;
}
.d-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); }

/* responsive */
@media (min-width: 640px) {
  #login { background: linear-gradient(160deg, #1a1040 0%, #2d1f7a 50%, #1a3050 100%); }
  #chat { max-width: 480px; margin: 0 auto; height: 100vh; }
  .messages { padding: 16px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="login-logo">🕌</div>
  <div class="login-title">فصل العربية</div>
  <div class="login-sub">Bienvenue! Rejoignez la classe</div>
  <div class="login-card">
    <div>
      <div class="field-label">VOTRE PRÉNOM / اسمك</div>
      <input class="text-inp" id="name-inp" type="text" placeholder="ex: Pierre, Marie, Ahmed..." maxlength="24" autocomplete="off" />
    </div>
    <div>
      <div class="field-label">VOTRE RÔLE / دورك</div>
      <div class="role-row">
        <div class="role-btn on" id="rb-student" onclick="setRole('student')">Étudiant — طالب</div>
        <div class="role-btn" id="rb-teacher" onclick="setRole('teacher')">Professeur — أستاذ</div>
      </div>
    </div>
    <button class="join-btn" onclick="joinChat()">Rejoindre — انضم ▶</button>
    <div class="err-msg" id="err">⚠ Veuillez entrer votre prénom / الرجاء كتابة اسمك</div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen" style="position:relative">
  <div class="chat-top">
    <button class="back-btn" onclick="leaveChat()">←</button>
    <div class="room-av">ف</div>
    <div class="top-info">
      <div class="top-name">غرفة الفصل</div>
      <div class="top-status" id="top-status">جارٍ التحميل...</div>
    </div>
    <div class="online-pill">
      <div class="green-dot"></div>
      <span id="online-num">0</span>
    </div>
    <button class="users-btn" onclick="toggleDrawer()">☰</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-wrap">
    <button class="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
    <input class="chat-inp" id="chat-inp" type="text" placeholder="اكتب بالعربية..." maxlength="300"
      onkeydown="if(event.key==='Enter')sendMsg()" autocomplete="off" />
  </div>

  <!-- drawer -->
  <div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-hdr">
      <div class="drawer-title">المتصلون الآن</div>
      <div class="drawer-sub" id="drawer-sub">0 في الفصل</div>
    </div>
    <div class="drawer-list" id="drawer-list"></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, set, remove, onDisconnect, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  🔧 CONFIGURATION FIREBASE
//  Remplacez par votre propre config Firebase
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const firebaseConfig = {
  apiKey: "AIzaSyC9WsBwhpG-UdM62Xa1BiZjW8gL74rAv34",
  authDomain: "parle-arabe.firebaseapp.com",
  databaseURL: "https://parle-arabe-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "parle-arabe",
  storageBucket: "parle-arabe.firebasestorage.app",
  messagingSenderId: "985415763625",
  appId: "1:985415763625:web:e9727341e4110572180bb8",
  measurementId: "G-W2ZH8P7JJ3"
};

const COLORS = [
  {bg:'#EEEDFE',fg:'#3C3489'},{bg:'#E1F5EE',fg:'#085041'},
  {bg:'#FAECE7',fg:'#712B13'},{bg:'#E6F1FB',fg:'#0C447C'},
  {bg:'#FAEEDA',fg:'#633806'},{bg:'#EAF3DE',fg:'#27500A'},
  {bg:'#FBEAF0',fg:'#72243E'},{bg:'#FCF0E8',fg:'#6B3A1F'},
];

let app, db, myName='', myRole='student', myUserRef=null;

function colorFor(n) {
  let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))%COLORS.length;
  return COLORS[h];
}
function initials(n) {
  const p=n.trim().split(' ');
  return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase();
}
function now() {
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

window.setRole = function(r) {
  myRole=r;
  document.getElementById('rb-student').classList.toggle('on',r==='student');
  document.getElementById('rb-teacher').classList.toggle('on',r==='teacher');
};

window.joinChat = async function() {
  const n = document.getElementById('name-inp').value.trim();
  if(!n){ document.getElementById('err').style.display='block'; return; }
  myName=n;

  try {
    app = initializeApp(firebaseConfig);
    db = getDatabase(app);
  } catch(e) {
    // Demo mode si Firebase non configuré
    startDemoMode();
    return;
  }

  // Présence utilisateur
  myUserRef = ref(db, 'users/'+myName);
  await set(myUserRef, {name:myName, role:myRole, ts: Date.now()});
  onDisconnect(myUserRef).remove();

  // Message d'entrée
  await push(ref(db,'messages'), {
    type:'system', text: myName+(myRole==='teacher'?' (أستاذ)':'')+' انضم إلى الفصل', ts:Date.now()
  });

  showChat();

  // Écoute messages
  onValue(ref(db,'messages'), snap => {
    const msgs=[];
    snap.forEach(c=>msgs.push(c.val()));
    renderMessages(msgs);
  });

  // Écoute utilisateurs
  onValue(ref(db,'users'), snap => {
    const users=[];
    snap.forEach(c=>users.push(c.val()));
    renderUsers(users);
  });
};

window.leaveChat = async function() {
  if(myUserRef) {
    await push(ref(db,'messages'),{type:'system',text:myName+' غادر الفصل',ts:Date.now()});
    await remove(myUserRef);
  }
  location.reload();
};

window.sendMsg = async function() {
  const inp=document.getElementById('chat-inp');
  const t=inp.value.trim(); if(!t) return;
  inp.value='';
  if(db) {
    await push(ref(db,'messages'),{type:'msg',from:myName,role:myRole,text:t,time:now(),ts:Date.now()});
  } else {
    demoSend(t);
  }
};

function showChat() {
  document.getElementById('login').classList.remove('active');
  document.getElementById('chat').classList.add('active');
  setTimeout(()=>document.getElementById('chat-inp').focus(),300);
}

function renderMessages(msgs) {
  const c=document.getElementById('messages');
  const atBot=c.scrollHeight-c.scrollTop-c.clientHeight<80;
  c.innerHTML='';
  msgs.sort((a,b)=>a.ts-b.ts).forEach(m=>{
    if(m.type==='system'){
      const d=document.createElement('div');
      d.className='sys-msg'; d.textContent=m.text; c.appendChild(d); return;
    }
    const isMe=m.from===myName, isTch=m.role==='teacher';
    const col=colorFor(m.from);
    const row=document.createElement('div');
    row.className='msg-row'+(isMe?' mine':'');
    let bbl='bubble ';
    if(isMe) bbl+='bubble-mine';
    else if(isTch) bbl+='bubble-teacher';
    else bbl+='bubble-other';
    row.innerHTML=`
      <div class="msg-av" style="background:${col.bg};color:${col.fg}">${initials(m.from)}</div>
      <div class="msg-body">
        <div class="msg-sender">${isMe?'أنت':m.from}${isTch&&!isMe?' <span class="teacher-badge">أستاذ</span>':''}</div>
        <div class="${bbl}">${escHtml(m.text)}</div>
        <div class="msg-time">${m.time||''}</div>
      </div>`;
    c.appendChild(row);
  });
  if(atBot) c.scrollTop=c.scrollHeight;
}

function renderUsers(users) {
  const n=users.length;
  document.getElementById('online-num').textContent=n;
  document.getElementById('top-status').textContent=n+' في الفصل — اكتب بالعربية!';
  document.getElementById('drawer-sub').textContent=n+(n===1?' متصل':' متصلون');
  const dl=document.getElementById('drawer-list');
  dl.innerHTML='';
  users.forEach(u=>{
    const c=colorFor(u.name);
    const d=document.createElement('div'); d.className='d-item';
    d.innerHTML=`
      <div class="msg-av" style="background:${c.bg};color:${c.fg};width:34px;height:34px;font-size:12px">${initials(u.name)}</div>
      <div class="d-name">${u.name}${u.name===myName?' (أنت)':''}</div>
      ${u.role==='teacher'?'<span class="d-tag">أستاذ</span>':''}
      <div class="d-dot"></div>`;
    dl.appendChild(d);
  });
}

window.toggleDrawer = function() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
};

function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── DEMO MODE (sans Firebase) ──
function startDemoMode() {
  showChat();
  let demoMsgs=[
    {type:'system',text:'مرحباً! هذا وضع العرض — أضف إعدادات Firebase لتفعيل الدردشة الحقيقية',ts:1},
    {type:'msg',from:'Pierre',role:'student',text:'مرحباً جميعاً!',time:'09:01',ts:2},
    {type:'msg',from:'الأستاذ',role:'teacher',text:'أهلاً وسهلاً! اكتبوا بالعربية من فضلكم',time:'09:02',ts:3},
    {type:'msg',from:'Marie',role:'student',text:'صباح الخير أستاذ',time:'09:03',ts:4},
  ];
  renderMessages(demoMsgs);
  renderUsers([
    {name:'Pierre',role:'student'},{name:'Marie',role:'student'},
    {name:'الأستاذ',role:'teacher'},{name:myName,role:myRole}
  ]);
  window._demoMsgs=demoMsgs;
}

window.demoSend = function(t) {
  window._demoMsgs.push({type:'msg',from:myName,role:myRole,text:t,time:now(),ts:Date.now()});
  renderMessages(window._demoMsgs);
};
</script>
</body>
</html>
